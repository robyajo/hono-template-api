# ============================================================
# KILEX BE — Nginx Configuration
# Letak: /etc/nginx/sites-available/kilex-api.mituni.id
# ============================================================

upstream kilex_api {
    server 127.0.0.1:8000;
    keepalive 64;
}

server {
    listen 80;
    server_name kilex-api.mituni.id;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name kilex-api.mituni.id;

    ssl_certificate /etc/letsencrypt/live/kilex-api.mituni.id/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kilex-api.mituni.id/privkey.pem;

    client_max_body_size 10M;

    location / {
        proxy_pass http://kilex_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    location /api/doc {
        proxy_pass http://kilex_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /uploads/ {
        alias /srv/www/node/kilex-api.mituni.id/be-kilex-mituni/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Strict-Transport-Security "max-age=31536000" always;

    access_log /var/log/nginx/kilex-api.access.log;
    error_log /var/log/nginx/kilex-api.error.log warn;
}